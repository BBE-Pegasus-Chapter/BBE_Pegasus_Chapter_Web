<section class="leaderboard-section">
  <h1 class="page-title">Bảng Xếp Hạng</h1>

  <div class="lb-container">
    <div class="lb-grid lb-header">
      <div>Thứ Hạng</div>
      <div>Họ Và Tên</div>
      <div>Mời Khách</div>
      <div>Gains</div>
      <div>My Post</div>
      <div>KPI</div>
    </div>

    <div class="lb-body" id="leaderboard-body">
      <div style="text-align: center; padding: 40px; font-weight: bold; color: var(--orange);">
        Đang tải dữ liệu từ máy chủ...
      </div>
    </div>
  </div>

  <div id="load-more-container" style="text-align: center; margin-top: 2rem; display: none;">
    <button id="btn-load-more" class="btn-information" style="padding: 10px 30px; border-radius: 50px; background: transparent; border: 2px solid var(--orange); color: var(--orange);">
      Xem thêm 
      <span style="font-size: 0.8rem; margin-left: 5px;">▼</span>
    </button>
  </div>
</section>

<script>
  let allData = [];      
  let currentIndex = 0;  
  const itemsPerPage = 10; 

  // 🛡️ Tấm khiên thép: Rửa sạch mã độc XSS
  function escapeHTML(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>'"]/g, match => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    })[match]);
  }

  async function fetchLeaderboard() {
    try {
      const response = await fetch('https://bbe-pegasus-chapter-web.onrender.com/api/leaderboard');
      
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      allData = await response.json(); 

      const container = document.getElementById('leaderboard-body');
      container.innerHTML = ''; 

      renderNextBatch();

    } catch (error) {
      console.error("Lỗi kết nối tới Backend:", error);
      document.getElementById('leaderboard-body').innerHTML = `
        <div style="text-align: center; padding: 40px; color: #ff4d4d; font-weight: bold;">
          Hệ thống đang tổng hợp dữ liệu hoặc bảo trì.<br>
          Vui lòng tải lại trang sau ít phút nhé! 🚀
        </div>
      `;
    }
  }

  function renderNextBatch() {
    const container = document.getElementById('leaderboard-body');
    const btnContainer = document.getElementById('load-more-container');

    const nextBatch = allData.slice(currentIndex, currentIndex + itemsPerPage);

    // ⚡ Tối ưu: Tạo một cái giỏ chứa HTML tạm thời
    let batchHTML = '';

    nextBatch.forEach(user => {
      let rankHTML = '';

      if (user.rank === 1) {
        rankHTML = `<div class="medal gold"><div class="ribbon"></div><div class="circle">1</div></div>`;
      } else if (user.rank === 2) {
        rankHTML = `<div class="medal silver"><div class="ribbon"></div><div class="circle">2</div></div>`;
      } else if (user.rank === 3) {
        rankHTML = `<div class="medal bronze"><div class="ribbon"></div><div class="circle">3</div></div>`;
      } else {
        rankHTML = `<span class="rank-number">${user.rank}</span>`;
      }

      // Nhét vào giỏ + Đeo khiên chống XSS cho TẤT CẢ dữ liệu
      batchHTML += `
        <div class="lb-grid lb-row">
          <div class="rank-box">${rankHTML}</div>
          <div>${escapeHTML(user.name)}</div>
          <div>${escapeHTML(user.invited)}</div>
          <div>${escapeHTML(user.gains)}</div>
          <div>${escapeHTML(user.My_Post)}</div>
          <div>${escapeHTML(user.kpi)}</div>
        </div>
      `;
    });

    // Sau khi vòng lặp xong, mới ụp cái giỏ đó vào giao diện (Đúng 1 lần)
    container.innerHTML += batchHTML;

    currentIndex += itemsPerPage;

    if (currentIndex >= allData.length) {
      btnContainer.style.display = 'none';
    } else {
      btnContainer.style.display = 'block'; 
    }
  }

  document.getElementById('btn-load-more').addEventListener('click', renderNextBatch);
  fetchLeaderboard();
</script>

</body>
</html>
